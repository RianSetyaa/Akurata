<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lupa Password - Akurata POS</title>
    <meta name="description" content="Atur ulang password akun Akurata POS melalui OTP email." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="stylesheet" href="styles.css?v=20260611-3" />
  </head>
  <body class="auth-page">
    <header class="topbar auth-topbar">
      <a class="brand" href="index.html" aria-label="Akurata POS">
        <span class="brand-mark"><img src="logo.png" alt="" /></span>
        <span class="brand-text">
          <span class="brand-name">Akurata POS</span>
          <span class="brand-tag">Kasir dan pembukuan toko</span>
        </span>
      </a>
      <nav class="nav" aria-label="Navigasi auth">
        <a href="login.html" class="nav-cta">Kembali masuk</a>
      </nav>
    </header>

    <main class="auth-shell">
      <section class="auth-card reveal is-visible">
        <div class="auth-heading">
          <span class="eyebrow">Pemulihan akun</span>
          <h1>Lupa password</h1>
          <p>Kami akan mengirim kode OTP ke email akun Anda.</p>
        </div>

        <form class="auth-form password-reset-form" data-password-reset-form novalidate>
          <input type="hidden" name="pending_id" data-reset-pending-id />

          <div data-reset-email-step>
            <label class="field">
              <span>Email</span>
              <input type="email" name="email" autocomplete="email" required />
            </label>
            <button type="submit" class="btn btn-primary">Kirim OTP</button>
          </div>

          <div data-reset-otp-step hidden>
            <label class="field">
              <span>Kode OTP</span>
              <input type="text" name="otp" inputmode="numeric" autocomplete="one-time-code" pattern="[0-9]{6}" maxlength="6" />
            </label>
            <label class="field">
              <span>Password baru</span>
              <input type="password" name="password" autocomplete="new-password" minlength="6" />
            </label>
            <label class="field">
              <span>Konfirmasi password baru</span>
              <input type="password" name="password_confirmation" autocomplete="new-password" minlength="6" />
            </label>
            <div class="form-actions">
              <button type="button" class="btn btn-ghost" data-reset-back>Ganti email</button>
              <button type="submit" class="btn btn-primary">Ubah password</button>
            </div>
          </div>
        </form>

        <p class="auth-switch">
          Ingat password?
          <a href="login.html">Masuk kembali</a>
        </p>
      </section>

      <aside class="auth-aside reveal is-visible" aria-label="Keamanan akun">
        <div class="auth-aside-top">
          <span class="screen-logo"><img src="logo.png" alt="" /></span>
          <span class="status-pill">OTP email</span>
        </div>
        <h2>Kode reset hanya berlaku selama 30 menit.</h2>
        <div class="auth-checklist">
          <span>Kode OTP 6 digit</span>
          <span>Maksimal 5 percobaan</span>
          <span>Password lama langsung diganti</span>
        </div>
      </aside>
    </main>

    <script src="lupa-password.js?v=20260611-3"></script>
  </body>
</html>
