<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masuk - Akurata POS Terminal</title>
    <meta name="description" content="Login kasir Akurata POS." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@500;600&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="../logo.png" />
    <link rel="stylesheet" href="pos.css?v=20260615-2" />
  </head>
  <body class="auth-page">
    <header class="topbar auth-topbar">
      <a class="brand" href="#" aria-label="Akurata POS">
        <span class="brand-mark">
          <img src="../logo.png" alt="" />
        </span>
        <span class="brand-text">
          <span class="brand-name">Akurata POS</span>
          <span class="brand-tag">Terminal kasir</span>
        </span>
      </a>
    </header>

    <main class="auth-shell">
      <section class="auth-card">
        <div class="auth-heading">
          <span class="eyebrow">Terminal kasir</span>
          <h1>Masuk POS</h1>
          <p>Gunakan akun kasir Anda untuk membuka terminal penjualan.</p>
        </div>

        <form class="auth-form" data-pos-login-form>
          <label class="field">
            <span>Email</span>
            <input type="text" name="identity" autocomplete="username" required />
          </label>

          <label class="field">
            <span>Password</span>
            <input type="password" name="password" autocomplete="current-password" required />
          </label>

          <div class="form-row">
            <label class="check-field">
              <input type="checkbox" name="remember" />
              <span>Ingat saya</span>
            </label>
          </div>

          <button type="submit" class="btn btn-primary">Masuk</button>
        </form>
      </section>
    </main>

    <script src="pos.js?v=20260615-2"></script>
  </body>
</html>
